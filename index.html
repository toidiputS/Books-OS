<head>

  <link rel="apple-touch-icon" href="/assets/icon-192.png" />

  <link

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Service Worker: unregister stale SWs first, then register only in production
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        // Always clean up stale registrations first
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const reg of registrations) {
          await reg.unregister();
          console.log('SW unregistered:', reg.scope);
        }
        // Only register in production (not localhost dev)
        if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((err) => {
              console.warn('SW registration failed:', err);
            });
        } else {
          console.log('SW skipped in dev mode');
        }
      });
    }
  </script>
</body>

</html>
